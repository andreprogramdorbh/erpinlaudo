; ============================================================
; Configurações PHP para importação CNES (BASE ~700MB)
; Este arquivo é lido pelo PHP-FPM automaticamente.
; Para Apache mod_php, as configurações estão no .htaccess.
; ============================================================

; Limite de tamanho de arquivo enviado via upload
upload_max_filesize = 1024M

; Limite total do corpo da requisição POST (deve ser >= upload_max_filesize)
post_max_size = 1024M

; Tempo máximo de execução do script (0 = ilimitado)
max_execution_time = 0

; Tempo máximo de espera pelo upload (segundos)
max_input_time = 3600

; Limite de memória do processo PHP
memory_limit = 512M
